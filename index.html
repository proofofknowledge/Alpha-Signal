<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Signal | AI-Powered Chart Pattern Recognition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --blue-primary: #0066ff;
            --blue-light: #00aaff;
            --blue-glow: rgba(0, 102, 255, 0.3);
            --dark-bg: #050810;
            --dark-card: #0d1117;
            --dark-border: #1a2035;
            --text-primary: #ffffff;
            --text-secondary: #8892a4;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* NAV */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            border-bottom: 1px solid var(--dark-border);
            position: sticky;
            top: 0;
            background: rgba(5, 8, 16, 0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
        }

        .nav-logo span {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #0066ff, #00aaff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--text-primary);
        }

        .btn-primary {
            background: linear-gradient(135deg, #0066ff, #00aaff);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.2s, transform 0.2s;
            display: inline-block;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-outline {
            background: transparent;
            color: var(--blue-light);
            border: 1px solid var(--blue-primary);
            padding: 10px 24px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
            display: inline-block;
        }

        .btn-outline:hover {
            background: var(--blue-glow);
        }

        /* HERO */
        .hero {
            text-align: center;
            padding: 100px 60px 80px;
            position: relative;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 400px;
            background: radial-gradient(ellipse, rgba(0, 102, 255, 0.12), transparent 70%);
            pointer-events: none;
        }

        .hero-badge {
            display: inline-block;
            background: rgba(0, 102, 255, 0.15);
            border: 1px solid rgba(0, 102, 255, 0.4);
            color: var(--blue-light);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 800;
            line-height: 1.15;
            max-width: 800px;
            margin: 0 auto 24px;
            letter-spacing: -1px;
        }

        .hero h1 span {
            background: linear-gradient(135deg, #0066ff, #00aaff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 1.15rem;
            color: var(--text-secondary);
            max-width: 560px;
            margin: 0 auto 40px;
        }

        .hero-cta {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* UPLOAD DEMO AREA */
        .demo-section {
            padding: 60px;
            max-width: 900px;
            margin: 0 auto;
        }

        .upload-area {
            border: 2px dashed var(--dark-border);
            border-radius: 16px;
            padding: 60px 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--dark-card);
            position: relative;
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--blue-primary);
            background: rgba(0, 102, 255, 0.05);
            box-shadow: 0 0 30px var(--blue-glow);
        }

        .upload-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 20px;
            opacity: 0.6;
        }

        .upload-area h3 {
            font-size: 1.2rem;
            margin-bottom: 8px;
        }

        .upload-area p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .upload-area input[type="file"] {
            display: none;
        }

        .free-badge {
            display: inline-block;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            color: #00ff88;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 16px;
        }

        /* ZOOM CONTROLS */
        .zoom-controls {
            display: none;
            justify-content: center;
            gap: 12px;
            margin-top: 16px;
        }

        .zoom-controls.visible {
            display: flex;
        }

        .zoom-btn {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            color: var(--text-primary);
            width: 36px;
            height: 36px;
            border-radius: 6px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .zoom-btn:hover {
            border-color: var(--blue-primary);
            color: var(--blue-light);
        }

        .image-preview-container {
            display: none;
            margin-top: 20px;
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            border: 1px solid var(--dark-border);
        }

        .image-preview-container.visible {
            display: block;
        }

        #previewImage {
            width: 100%;
            transform-origin: center;
            transition: transform 0.2s;
            display: block;
        }

        /* HOW IT WORKS */
        .how-it-works {
            padding: 80px 60px;
            text-align: center;
        }

        .section-label {
            color: var(--blue-light);
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }

        .section-subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
            max-width: 500px;
            margin: 0 auto 60px;
        }

        .steps-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            max-width: 900px;
            margin: 0 auto;
        }

        .step-card {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            border-radius: 16px;
            padding: 36px 28px;
            text-align: left;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .step-card:hover {
            border-color: var(--blue-primary);
            box-shadow: 0 0 20px var(--blue-glow);
        }

        .step-number {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #0066ff, #00aaff);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1rem;
            margin-bottom: 20px;
        }

        .step-card h3 {
            font-size: 1.05rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .step-card p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* PRICING */
        .pricing {
            padding: 80px 60px;
            text-align: center;
        }

        .pricing-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            max-width: 700px;
            margin: 0 auto;
        }

        .pricing-card {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            border-radius: 16px;
            padding: 36px 28px;
            text-align: left;
            position: relative;
        }

        .pricing-card.featured {
            border-color: var(--blue-primary);
            box-shadow: 0 0 30px var(--blue-glow);
        }

        .popular-badge {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #0066ff, #00aaff);
            color: white;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            white-space: nowrap;
        }

        .pricing-tier {
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }

        .pricing-price {
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 4px;
            letter-spacing: -1px;
        }

        .pricing-price span {
            font-size: 1rem;
            font-weight: 400;
            color: var(--text-secondary);
        }

        .pricing-desc {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-bottom: 24px;
        }

        .pricing-features {
            list-style: none;
            margin-bottom: 28px;
        }

        .pricing-features li {
            font-size: 0.9rem;
            padding: 8px 0;
            border-bottom: 1px solid var(--dark-border);
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-secondary);
        }

        .pricing-features li:last-child {
            border-bottom: none;
        }

        .check {
            color: #00ff88;
            font-weight: 700;
            flex-shrink: 0;
        }

        .x-mark {
            color: #ff4455;
            font-weight: 700;
            flex-shrink: 0;
        }

        /* WAITLIST */
        .waitlist {
            padding: 80px 60px;
            text-align: center;
        }

        .waitlist-box {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            border-radius: 20px;
            padding: 60px 40px;
            max-width: 560px;
            margin: 0 auto;
        }

        .waitlist-box h2 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 12px;
        }

        .waitlist-box p {
            color: var(--text-secondary);
            margin-bottom: 28px;
            font-size: 0.95rem;
        }

        .email-form {
            display: flex;
            gap: 12px;
        }

        .email-form input {
            flex: 1;
            background: var(--dark-bg);
            border: 1px solid var(--dark-border);
            color: var(--text-primary);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .email-form input:focus {
            border-color: var(--blue-primary);
        }

        .email-form input::placeholder {
            color: var(--text-secondary);
        }

        /* DISCLAIMER */
        .disclaimer {
            padding: 40px 60px;
            border-top: 1px solid var(--dark-border);
            text-align: center;
        }

        .disclaimer p {
            color: var(--text-secondary);
            font-size: 0.8rem;
            max-width: 700px;
            margin: 0 auto;
            line-height: 1.7;
        }

        /* FOOTER */
        footer {
            padding: 30px 60px;
            border-top: 1px solid var(--dark-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        footer p {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        footer a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }

        footer a:hover {
            color: var(--text-primary);
        }

        .footer-links {
            display: flex;
            gap: 24px;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            nav { padding: 16px 24px; }
            .hero { padding: 60px 24px 40px; }
            .hero h1 { font-size: 2.2rem; }
            .demo-section { padding: 40px 24px; }
            .how-it-works { padding: 60px 24px; }
            .steps-grid { grid-template-columns: 1fr; }
            .pricing { padding: 60px 24px; }
            .pricing-grid { grid-template-columns: 1fr; }
            .waitlist { padding: 60px 24px; }
            .email-form { flex-direction: column; }
            footer { flex-direction: column; gap: 16px; text-align: center; }
        }
    </style>
</head>
<body>

    <!-- NAV -->
    <nav>
        <a href="#" class="nav-logo">
            <svg class="logo-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 4L36 34H4L20 4Z" fill="url(#grad1)" opacity="0.9"/>
                <path d="M13 24L18 16L22 21L26 17L30 24" stroke="#00aaff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                <defs>
                    <linearGradient id="grad1" x1="4" y1="4" x2="36" y2="34" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#0066ff"/>
                        <stop offset="100%" stop-color="#00aaff"/>
                    </linearGradient>
                </defs>
            </svg>
            <span>ALPHA SIGNAL</span>
        </a>
        <div class="nav-links">
            <a href="#how-it-works">How It Works</a>
            <a href="#pricing">Pricing</a>
            <a href="#waitlist" class="btn-primary">Get Early Access</a>
        </div>
    </nav>

    <!-- HERO -->
    <section class="hero">
        <div class="hero-badge">AI
